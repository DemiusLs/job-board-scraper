<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <title>Job Scraper Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .job-card:hover { transform: scale(1.01); transition: 0.2s; }
        .description-truncate {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">LinkedIn Job Scraper</span>
        <a th:href="@{/jobs/scrape}" class="btn btn-light">Aggiorna Offerte</a>
    </div>
</nav>

<div class="container">
    <div class="row mb-4 bg-white p-3 shadow-sm rounded">
        <div class="col-md-4">
            <label class="form-label font-weight-bold">Cerca per Titolo/Azienda</label>
            <input type="text" id="searchInput" class="form-control" placeholder="Es: Java, Milano, Amazon...">
        </div>
        <div class="col-md-4">
            <label class="form-label font-weight-bold">Modalità</label>
            <select id="modeFilter" class="form-select">
                <option value="">Tutte le modalità</option>
                <option value="Remote">Solo Remoto</option>
                <option value="On-site">Ibrido</option>
                <option value="Hybrid">In Sede</option>
            </select>
        </div>
        <div class="col-md-4 d-flex align-items-end">
            <button onclick="filterJobs()" class="btn btn-primary w-100">Applica Filtri</button>
        </div>
    </div>

    <div class="table-responsive bg-white shadow-sm rounded">
        <table class="table table-hover align-middle" id="jobTable">
            <thead class="table-dark">
                <tr>
                    <th>Titolo</th>
                    <th>Azienda</th>
                    <th>Località</th>
                    <th>Modalità</th>
                    <th>Azione</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="job : ${jobs}" class="job-row">
                    <td class="fw-bold text-primary" th:text="${job.title}">Titolo</td>
                    <td th:text="${job.company}">Azienda</td>
                    <td th:text="${job.location}">Località</td>
                    <td>
                        <span th:if="${job.workMode == 'Remote'}" class="badge bg-success">Remoto</span>
                        <span th:if="${job.workMode == 'Hybrid'}" class="badge bg-info text-dark">Ibrido</span>
                        <span th:if="${job.workMode == 'On-site'}" class="badge bg-secondary">In Sede</span>
                    </td>
                    <td>
                        <a th:href="${job.link}" target="_blank" class="btn btn-sm btn-outline-dark">Link</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<footer class="text-center py-4 text-muted">
    <small>Job Scraper v1.0 - Java 25 & Spring Boot 4</small>
</footer>

<script>
function filterJobs() {
    let searchInput = document.getElementById("searchInput").value.toLowerCase();
    let modeFilter = document.getElementById("modeFilter").value.toLowerCase();
    let rows = document.querySelectorAll(".job-row");

    rows.forEach(row => {
        let rowText = row.innerText.toLowerCase();
        let rowMode = row.querySelector("td:nth-child(4)").innerText.toLowerCase();

        let matchesSearch = rowText.includes(searchInput);
        let matchesMode = modeFilter === "" || rowMode.includes(modeFilter);

        if (matchesSearch && matchesMode) {
            row.style.display = "";
        } else {
            row.style.display = "none";
        }
    });
}
</script>

</body>
</html>
