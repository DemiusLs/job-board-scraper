<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <title>Job Scraper Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .job-card:hover { transform: scale(1.01); transition: 0.2s; }
        .description-truncate {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">LinkedIn Job Scraper</span>
        <a th:href="@{/jobs/scrape}" class="btn btn-light">Aggiorna Offerte</a>
    </div>
</nav>

<div class="container mb-4 mt-4">
    <div class="row g-3">
        <div class="col-md-3">
            <input type="text" id="filterLocation" class="form-control" placeholder="Cerca luogo (es. Milano)..." onkeyup="filterJobs()">
        </div>
        
        <div class="col-md-3">
            <input type="text" id="filterCategory" class="form-control" placeholder="Cerca categoria (es. IT)..." onkeyup="filterJobs()">
        </div>

        <div class="col-md-3">
            <select id="filterWorkMode" class="form-select" onchange="filterJobs()">
                <option value="ALL">Tutte le modalità</option>
                <option value="Remote">Solo Remoto</option>
                <option value="Hybrid">Ibrido</option>
                <option value="On-site">In sede</option>
            </select>
        </div>
        
        <div class="col-md-3">
            <button class="btn btn-secondary w-100" onclick="resetFilters()">Resetta Filtri</button>
        </div>
    </div>
</div>

<div class="container">
    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>Data</th>
                <th>Titolo</th>
                <th>Azienda</th>
                <th>Località</th>
                <th>Modalità</th>
                <th>Categoria</th>
                <th>Azione</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="job : ${jobs}" 
                class="job-row"
                th:data-workmode="${job.workMode}" 
                th:data-category="${job.category}"
                th:data-location="${job.location}">
                
                <td th:text="${job.publishDate != null ? #temporals.format(job.publishDate, 'dd/MM/yyyy') : '-'}">Data</td>
                <td class="fw-bold" th:text="${job.title}">Titolo</td>
                <td th:text="${job.company}">Azienda</td>
                <td th:text="${job.location}">Località</td>
                
                <td>
                    <span th:class="${job.workMode == 'Remote' ? 'badge bg-success' : (job.workMode == 'Hybrid' ? 'badge bg-warning text-dark' : 'badge bg-secondary')}" 
                          th:text="${job.workMode}">Modalità</span>
                </td>
                
                <td th:text="${job.category}">Categoria</td>
                <td>
                    <a th:href="${job.link}" target="_blank" class="btn btn-sm btn-primary">Candidati</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    function filterJobs() {
        // 1. Leggi cosa ha scritto/selezionato l'utente (convertito in minuscolo per non avere problemi con le maiuscole)
        const locFilter = document.getElementById('filterLocation').value.toLowerCase();
        const catFilter = document.getElementById('filterCategory').value.toLowerCase();
        const modeFilter = document.getElementById('filterWorkMode').value;
        
        // 2. Prendi tutte le righe
        const rows = document.querySelectorAll('.job-row');
        
        rows.forEach(row => {
            // 3. Leggi i dati della singola riga
            const rowLoc = (row.getAttribute('data-location') || '').toLowerCase();
            const rowCat = (row.getAttribute('data-category') || '').toLowerCase();
            const rowMode = row.getAttribute('data-workmode');
            
            // 4. Controlla se la riga rispetta TUTTI e tre i filtri
            const matchesLoc = rowLoc.includes(locFilter);
            const matchesCat = rowCat.includes(catFilter);
            const matchesMode = (modeFilter === 'ALL' || rowMode === modeFilter);
            
            // 5. Mostra o nascondi
            if (matchesLoc && matchesCat && matchesMode) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    }

    function resetFilters() {
        // Svuota tutti i campi e ricarica
        document.getElementById('filterLocation').value = '';
        document.getElementById('filterCategory').value = '';
        document.getElementById('filterWorkMode').value = 'ALL';
        filterJobs(); 
    }
</script>

</body>
</html>
