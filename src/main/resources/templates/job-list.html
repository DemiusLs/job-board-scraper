<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <title>Job Scraper Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .job-card:hover { transform: scale(1.01); transition: 0.2s; }
        .description-truncate {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Universal Job Scraper</span>
    </div>
</nav>

<div class="container mb-4">
    <div class="card shadow-sm border-primary">
        <div class="card-body">
            <h5 class="card-title text-primary mb-3">Cerca nuove offerte di lavoro dal Web</h5>
            <form th:action="@{/jobs/search}" method="post" class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label">Cosa (Titolo, Parola chiave)</label>
                    <input type="text" name="title" class="form-control" placeholder="es. Java, Marketing..." required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Dove (Città o Nazione)</label>
                    <input type="text" name="location" class="form-control" placeholder="es. Milano, Italy..." required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Piattaforma</label>
                    <select name="provider" class="form-select">
                        <option value="Tutte">Tutte (Lento)</option>
                        <option value="Adzuna" selected>Adzuna (Veloce)</option>
                        <option value="Indeed">Indeed (Selenium)</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" name="remoteOnly" id="remoteOnly">
                        <label class="form-check-label" for="remoteOnly">Solo Remoto</label>
                    </div>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Avvia Scraping</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="container mb-4 mt-4">
    <h5 class="mb-3">Filtra i lavori salvati nel Database</h5>
    <div class="row g-3">
        <div class="col-md-3">
            <input type="text" id="filterLocation" class="form-control" placeholder="Filtra luogo..." onkeyup="filterJobs()">
        </div>
        <div class="col-md-3">
            <input type="text" id="filterCategory" class="form-control" placeholder="Filtra categoria..." onkeyup="filterJobs()">
        </div>
        <div class="col-md-3">
            <select id="filterWorkMode" class="form-select" onchange="filterJobs()">
                <option value="ALL">Tutte le modalità</option>
                <option value="Remote">Solo Remoto</option>
                <option value="Hybrid">Ibrido</option>
                <option value="On-site">In sede</option>
            </select>
        </div>
        <div class="col-md-3">
            <button class="btn btn-secondary w-100" onclick="resetFilters()">Resetta Filtri</button>
        </div>
    </div>
</div>

<div class="container">
    <table class="table table-striped table-hover shadow-sm bg-white">
        <thead class="table-dark">
            <tr>
                <th>Data</th>
                <th>Titolo</th>
                <th>Azienda</th>
                <th>Località</th>
                <th>Modalità</th>
                <th>Piattaforma</th> <th>Azione</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="job : ${jobs}" 
                class="job-row"
                th:data-workmode="${job.workMode}" 
                th:data-category="${job.category}"
                th:data-location="${job.location}">
                
                <td th:text="${job.publishDate != null ? #temporals.format(job.publishDate, 'dd/MM/yyyy') : '-'}">Data</td>
                <td class="fw-bold" th:text="${job.title}">Titolo</td>
                <td th:text="${job.company}">Azienda</td>
                <td th:text="${job.location}">Località</td>
                
                <td>
                    <span th:class="${job.workMode == 'Remote' ? 'badge bg-success' : (job.workMode == 'Hybrid' ? 'badge bg-warning text-dark' : 'badge bg-secondary')}" 
                          th:text="${job.workMode}">Modalità</span>
                </td>
                
                <td>
                    <span class="badge bg-info text-dark" th:text="${job.provider != null ? job.provider : job.category}">Adzuna</span>
                </td>
                <td>
                    <a th:href="${job.link}" target="_blank" class="btn btn-sm btn-primary">Candidati</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    function filterJobs() {
        const locFilter = document.getElementById('filterLocation').value.toLowerCase();
        const catFilter = document.getElementById('filterCategory').value.toLowerCase();
        const modeFilter = document.getElementById('filterWorkMode').value;
        
        const rows = document.querySelectorAll('.job-row');
        
        rows.forEach(row => {
            const rowLoc = (row.getAttribute('data-location') || '').toLowerCase();
            const rowCat = (row.getAttribute('data-category') || '').toLowerCase();
            const rowMode = row.getAttribute('data-workmode');
            
            const matchesLoc = rowLoc.includes(locFilter);
            const matchesCat = rowCat.includes(catFilter);
            const matchesMode = (modeFilter === 'ALL' || rowMode === modeFilter);
            
            if (matchesLoc && matchesCat && matchesMode) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    }

    function resetFilters() {
        document.getElementById('filterLocation').value = '';
        document.getElementById('filterCategory').value = '';
        document.getElementById('filterWorkMode').value = 'ALL';
        filterJobs(); 
    }
</script>

</body>
</html>
